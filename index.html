<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>phone-app</title>
  <!-- Favicon: inline SVG(手机轮廓 + 蓝色屏幕)。base64 / .ico 文件嫌麻烦,
       SVG data URI 一行搞定,所有现代浏览器支持。 -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect x='5.5' y='1.5' width='13' height='21' rx='3' fill='%235a8dee' stroke='%23365bb8' stroke-width='0.6'/><rect x='7' y='3.5' width='10' height='14.5' rx='0.6' fill='%23eaf0ff'/><circle cx='12' cy='20.5' r='1' fill='%23eaf0ff'/></svg>">
  <!-- iOS / Android 添加到主屏幕 / 书签时用的图标。180×180+ PNG/JPG 最稳,
       用户给的图床 URL,iOS 会自动缩到合适尺寸。 -->
  <link rel="apple-touch-icon" href="https://files.catbox.moe/gxqcm0.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Noto+Serif+SC:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap">
  <link rel="stylesheet" href="./src/styles/base.css">
  <link rel="stylesheet" href="./src/styles/themes.css">
  <link rel="stylesheet" href="./src/styles/memory-styles.css">
  <!-- Splash 样式 inline 在 head — base.css 是 stylesheet link 要等下载完才
       渲染,但 splash 想在最早时刻就出现。boot 跑完 renderShell() 会把
       #app 内容覆盖,splash 自然消失,无需 JS 主动清。
       视觉:iOS 锁屏感 — 渐变"壁纸"背景,中央大字时间,下面日期。
       不用 spinner — 加载本来就秒级,spinner 反而显得卡。 -->
  <style>
    /* Splash 现在是"phone-frame skeleton" — 外层灰色背板撑满视口,内层
       phone-shaped 框跟 base.css 里 .phone-frame 同尺寸 + 圆角 + 壁纸。
       boot 跑完真 phone-frame 出现,无缝过渡(同位置 / 同尺寸 / 同壁纸)。
       桌面端不再 fullscreen 撑屏。 */
    .splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #c7c7cc;  /* 跟 DEFAULT_THEME.outsideBg 对齐 */
      z-index: 9999;
    }
    .splash-phone {
      position: relative;
      width: clamp(400px, calc((100vh - 24px) * 9 / 19.5), 480px);
      height: calc(100vh - 24px);
      max-height: calc(480px * 19.5 / 9);
      border-radius: 36px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      /* 默认背景:紫蓝粉渐变(没设过壁纸 / IDB 不可用时 fallback)。
         splash inline JS 会读 settings.wallpaper 盖掉这层。 */
      background: linear-gradient(155deg, #5b6dca 0%, #8062c9 55%, #c87fa6 100%);
      background-size: cover;
      background-position: center;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", "PingFang SC", sans-serif;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.35);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
    }
    /* 手机内的暗色 vignette,user 上传的浅色壁纸文字仍能读清 */
    .splash-phone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.05) 0%, rgba(0, 0, 0, 0.25) 100%);
      pointer-events: none;
    }
    .splash-clock,
    .splash-date {
      position: relative;
      z-index: 1;
    }
    .splash-clock {
      font-size: clamp(56px, 11vw, 84px);
      font-weight: 200;  /* iOS 锁屏是细字 */
      letter-spacing: -0.02em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .splash-date {
      font-size: 15px;
      font-weight: 500;
      opacity: 0.92;
      margin-top: 10px;
      letter-spacing: 0.04em;
    }
    /* 极窄屏(真手机)— clamp 顶到 400 也太宽时退回 100% */
    @media (max-width: 440px) {
      .splash-phone {
        width: 100vw;
        height: 100vh;
        max-height: none;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="splash" aria-label="正在启动">
      <div class="splash-phone">
        <div class="splash-clock">--:--</div>
        <div class="splash-date">&nbsp;</div>
      </div>
    </div>
  </div>
  <!-- splash inline 脚本 — 不依赖任何模块,立即跑:
       1) 同步把当前时间 / 日期写到 .splash-clock / .splash-date
       2) 异步开 IDB 读 settings.wallpaper,有的话 set 到 .splash 的
          background-image 盖掉默认渐变。读完之前 splash 可能就被 boot()
          替换掉了 — 那就没机会显示壁纸,fallback 渐变也 OK。
       boot 跑完 #app innerHTML 被覆盖,splash element 跟着没了。 -->
  <script>
    (() => {
      // 1. 时间 / 日期(同步,立即可见)
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      const weekday = ['日', '一', '二', '三', '四', '五', '六'][now.getDay()];
      const clock = document.querySelector('.splash-clock');
      const date  = document.querySelector('.splash-date');
      if (clock) clock.textContent = hh + ':' + mm;
      if (date)  date.textContent  = '星期' + weekday + ' · ' + (now.getMonth() + 1) + '月' + now.getDate() + '日';

      // 2. 壁纸(异步,读完才能显示)— 跟 main.js 用同一个 db name / store
      //    (见 src/core/db.js DB_NAME='phone-app',settings store id='default')。
      //    任何 IDB 异常都静默跳过,默认渐变继续显示。
      try {
        const req = indexedDB.open('phone-app');
        req.onsuccess = () => {
          try {
            const idb = req.result;
            if (!idb.objectStoreNames.contains('settings')) { idb.close(); return; }
            const tx = idb.transaction('settings', 'readonly');
            const get = tx.objectStore('settings').get('default');
            get.onsuccess = () => {
              const wp = get.result && get.result.wallpaper;
              const splashPhone = document.querySelector('.splash-phone');
              if (wp && splashPhone) {
                splashPhone.style.backgroundImage = 'url("' + wp + '")';
              }
              idb.close();
            };
            get.onerror = () => idb.close();
          } catch (_) { /* swallow */ }
        };
      } catch (_) { /* swallow */ }
    })();
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
